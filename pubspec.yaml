name: dart2esm
description: A Dart-to-native-ESM compiler backend experiment.
version: 0.0.0
repository: https://github.com/medz/dart2esm
issue_tracker: https://github.com/medz/dart2esm/issues

environment:
  sdk: ^3.8.0

executables:
  dart2esm:

dev_dependencies:
  test: ^1.26.0
dependencies:
  args: ^2.7.0
  package_config: ^2.2.0
  path: ^1.9.1

dependency_overrides:
  kernel:
    git:
      url: https://github.com/dart-lang/sdk.git
      ref: 3.12.2
      path: pkg/kernel
